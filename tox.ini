[tox]
envlist = py311, lint, type
isolated_build = true

[testenv]
deps = 
    pytest
    pytest-asyncio
    pytest-cov
    httpx
commands = pytest tests/ -v --cov=src --cov-report=term-missing

[testenv:lint]
deps = 
    black
    flake8
    isort
commands = 
    black --check src/ tests/
    flake8 src/ tests/
    isort --check-only src/ tests/

[testenv:type]
deps = 
    mypy
    sqlalchemy
    pydantic
commands = mypy src/

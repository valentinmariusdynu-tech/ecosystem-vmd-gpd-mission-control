version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sport-os-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./sport_os.db
      - JWT_SECRET=dev-secret-change-me-in-production-min-32-chars
      - DEBUG=true
    volumes:
      - ./sport_os.db:/app/sport_os.db
    networks:
      - sport-os

  prometheus:
    image: prom/prometheus:latest
    container_name: sport-os-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - sport-os

  grafana:
    image: grafana/grafana:latest
    container_name: sport-os-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - sport-os

networks:
  sport-os:
    driver: bridge
